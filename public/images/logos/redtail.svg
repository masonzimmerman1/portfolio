  <clipPath id="sh"><path d="M12 8 H88 a4 4 0 0 1 4 4 V62 Q92 88 50 106 Q8 88 8 62 V12 a4 4 0 0 1 4-4 Z"/></clipPath>
  <g clip-path="url(#sh)">
    <rect x="4" y="6" width="92" height="40" fill="#e0481f"/>
  </g>
  <text x="50" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800" letter-spacing="0.5">REDTAIL</text>
  <text x="50" y="60" text-anchor="middle" fill="#e0481f" font-size="11.5" font-weight="800" letter-spacing="0.5">GOLF CENTER</text>
  <!-- simplified hawk: spread wings + body -->
  <g fill="#161616">
    <path d="M50 70 L40 76 L24 74 L38 80 L26 84 L42 84 L50 92 L58 84 L74 84 L62 80 L76 74 L60 76 Z"/>
    <path d="M50 70 L47 86 L50 96 L53 86 Z" fill="#e0481f"/>
