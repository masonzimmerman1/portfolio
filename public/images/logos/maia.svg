<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 104" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="maiaRing" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6d28b8"/>
      <stop offset="0.5" stop-color="#9b3fd1"/>
      <stop offset="1" stop-color="#f5c842"/>
    </linearGradient>
    <linearGradient id="maiaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1640"/>
      <stop offset="1" stop-color="#3c1d4f"/>
    </linearGradient>
  </defs>
  <!-- outer gradient ring -->
  <polygon points="50,3 91,26 91,72 50,95 9,72 9,26" fill="url(#maiaRing)"/>
  <!-- dark interior -->
  <polygon points="50,11 84,30 84,68 50,87 16,68 16,30" fill="url(#maiaFill)"/>
  <!-- thin gold inner edge -->
  <polygon points="50,15 80,32 80,66 50,83 20,66 20,32" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.6"/>
  <!-- circuit traces -->
  <g stroke="#f5c842" stroke-width="1.3" fill="#f5c842" opacity="0.85">
    <circle cx="26" cy="38" r="2.1"/><circle cx="74" cy="38" r="2.1"/>
    <circle cx="26" cy="62" r="2.1"/><circle cx="74" cy="62" r="2.1"/>
    <circle cx="50" cy="24" r="2.4"/>
    <line x1="26" y1="38" x2="36" y2="38"/><line x1="74" y1="38" x2="64" y2="38"/>
    <line x1="26" y1="62" x2="36" y2="62"/><line x1="74" y1="62" x2="64" y2="62"/>
    <line x1="50" y1="24" x2="50" y2="33"/>
  </g>
  <text x="50" y="58" text-anchor="middle" fill="#f4ecff" font-size="25" font-weight="800" letter-spacing="1.5">MAIA</text>
  <text x="50" y="74" text-anchor="middle" fill="#f5c842" font-size="6.5" font-weight="700" letter-spacing="0.8">MARSHALL AI ASSOCIATION</text>
</svg>
