<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" font-family="Arial, Helvetica, sans-serif">
  <rect width="680" height="430" fill="#ffffff"/>
  <text x="40" y="46" fill="#1c2733" font-size="21" font-weight="800">Revenue per quote, by category</text>
  <text x="40" y="70" fill="#6b7686" font-size="14">Indexed to Category A = 1.0 · win rates stay near ~11% across A and B</text>

  <!-- baseline -->
  <line x1="80" y1="340" x2="640" y2="340" stroke="#c7d0db" stroke-width="2"/>

  <!-- Category A bar (index 1.0) -->
  <rect x="120" y="312" width="120" height="28" fill="#a51c30"/>
  <text x="180" y="333" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">1.0×</text>
  <text x="180" y="364" text-anchor="middle" fill="#1c2733" font-size="14" font-weight="700">Category A</text>
  <text x="180" y="384" text-anchor="middle" fill="#6b7686" font-size="12">~4.5× more quotes</text>

  <!-- Category B bar (index 7.4) -->
  <rect x="300" y="132" width="120" height="208" fill="#0f2a43"/>
  <text x="360" y="122" text-anchor="middle" fill="#0f2a43" font-size="20" font-weight="800">7.4×</text>
  <text x="360" y="364" text-anchor="middle" fill="#1c2733" font-size="14" font-weight="700">Category B</text>
  <text x="360" y="384" text-anchor="middle" fill="#6b7686" font-size="12">highest revenue / quote</text>

  <!-- Category C bar (high variance) -->
  <rect x="480" y="180" width="120" height="160" fill="none" stroke="#c9a227" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="540" y="170" text-anchor="middle" fill="#9a7d1e" font-size="13" font-weight="700">high variance</text>
  <text x="540" y="364" text-anchor="middle" fill="#1c2733" font-size="14" font-weight="700">Category C</text>
  <text x="540" y="384" text-anchor="middle" fill="#6b7686" font-size="12">few data points · "moonshots"</text>

  <text x="40" y="416" fill="#a51c30" font-size="13" font-weight="700">Takeaway: reallocate quoting effort toward Category B — same win rate, ~7.4× the revenue per quote.</text>
</svg>
